name: Update Latest Projects and Blog Posts

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    env:
      USERNAME_GITHUB: ${{ secrets.USERNAME_GITHUB }}
      PROFILE_REPO: ${{ secrets.PROFILE_REPO }}
      MEDIUM_USERNAME: ${{ secrets.MEDIUM_USERNAME }}
      README_PATH: ${{ secrets.README_PATH }}
      PROJECT_LIMIT: ${{ secrets.PROJECT_LIMIT }}
      POST_LIMIT: ${{ secrets.POST_LIMIT }}
      EXCLUDED_REPOS: ${{ secrets.EXCLUDED_REPOS }}
      TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}

      # Let the Python script read the token with the expected name
      GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN_GITHUB }}
          persist-credentials: true

      - name: Show effective configuration
        run: |
          echo "USERNAME_GITHUB=$USERNAME_GITHUB"
          echo "PROFILE_REPO=$PROFILE_REPO"
          echo "MEDIUM_USERNAME=$MEDIUM_USERNAME"
          echo "README_PATH=$README_PATH"
          echo "PROJECT_LIMIT=$PROJECT_LIMIT"
          echo "POST_LIMIT=$POST_LIMIT"
          echo "EXCLUDED_REPOS=$EXCLUDED_REPOS"
          echo "BRANCH=${GITHUB_REF_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README
        run: python scripts/update_readme.py

      - name: Commit changes
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$README_PATH"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update latest projects and blog posts"

      - name: Rebase and push
        shell: bash
        run: |
          set -e
          BRANCH="${GITHUB_REF_NAME}"

          git remote set-url origin "https://x-access-token:${TOKEN_GITHUB}@github.com/${GITHUB_REPOSITORY}.git"

          for i in 1 2 3; do
            echo "Push attempt $i..."

            git fetch origin "$BRANCH"
            git rebase "origin/$BRANCH" || {
              echo "Rebase failed. Aborting and retrying..."
              git rebase --abort || true
              sleep 5
              continue
            }

            if git push origin HEAD:"$BRANCH"; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed. Retrying in 5 seconds..."
            sleep 5
          done

          echo "Push failed after 3 attempts."
          exit 1